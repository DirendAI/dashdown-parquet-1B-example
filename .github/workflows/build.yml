name: Build & deploy dashboard

on:
  schedule:
    - cron: "17 5 * * *" # nightly poll — the detect job below skips the build if TLC has no new month
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Force a rebuild even if the TLC data has not changed"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

jobs:
  # Cheap gate (HEAD probes only, no 43 GB download): build only when TLC has
  # published a newer month than what's currently live — or when forced / pushed.
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide whether to build
        id: decide
        env:
          FORCE: ${{ github.event.inputs.force }}
          EVENT: ${{ github.event_name }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          # A code push, or a manual run with "force", always rebuilds.
          if [ "$EVENT" = "push" ] || [ "$FORCE" = "true" ]; then
            echo "Building unconditionally (event=$EVENT force=${FORCE:-false})."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Otherwise (scheduled / manual-no-force): build only if the newest
          # published month differs from what the live site was built against.
          available=$(python scripts/fetch_data.py --print-latest)
          url="https://$(echo "$OWNER" | tr '[:upper:]' '[:lower:]').github.io/${REPO}/LATEST.txt"
          deployed=$(curl -fsSL "$url" || true)   # empty on first run / 404 → treated as changed
          echo "newest available: [$(echo "$available" | tr '\n' ' ')]"
          echo "currently live:   [$(echo "$deployed" | tr '\n' ' ')]"
          if [ "$available" != "$deployed" ]; then
            echo "TLC data changed → building."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new TLC data → skipping build (live site stays as-is)."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      # The raw Parquet is ~38 GB; the stock runner has ~14 GB free, so trade
      # the preinstalled toolchains we don't use for disk space.
      - name: Maximize disk space
        uses: easimon/maximize-build-space@v10
        with:
          # Leave ~6 GB free on the ROOT filesystem — pip installs there, and
          # 2 GB was too tight (a nightly build died with ENOSPC mid-install).
          # The build volume still gets 75+ GB for the 38 GB Parquet download.
          root-reserve-mb: 6144
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dashdown
        # --no-cache-dir keeps pip from caching wheels on the tight root fs.
        run: pip install --no-cache-dir 'dashdown-md[mistral]'

      - name: Download raw TLC Parquet (~38 GB, 2020-01 → newest month)
        run: python scripts/fetch_data.py

      - name: Build static dashboard (DuckDB crunches ~1.6B rows here)
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }} # optional — Ask cards degrade gracefully without it
        run: |
          df -h /
          time dashdown build . --out dist
          # Publish the newest-month fingerprint so the next run's detect job
          # can tell whether the live site is already current.
          cp data/latest/LATEST.txt dist/LATEST.txt
          # Google Search Console ownership proof — must be served at the site
          # root, and Pages serves dist/, not the repo root.
          cp google39d4447bbfa3896a.html dist/

      - name: Inject PostHog analytics
        # No-op unless the POSTHOG_KEY secret is set. The project key is
        # public/write-only and ships in the page source; storing it as a secret
        # still works for same-repo push/schedule/dispatch runs.
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: python .github/scripts/inject_posthog.py dist

      - name: Inject SEO meta tags, sitemap.xml, robots.txt
        # Dashdown emits no meta description / OG tags / sitemap, so links
        # shared on Slack, X or HN unfurl bare and crawlers get no summary.
        # Same post-build pattern as the PostHog step above.
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          export SITE_URL="https://$(echo "$OWNER" | tr '[:upper:]' '[:lower:]').github.io/${REPO}"
          python .github/scripts/inject_seo.py dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
