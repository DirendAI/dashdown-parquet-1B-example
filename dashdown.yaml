title: NYC Rides × DuckDB
agents: [claude]   # coding-agent guides to keep in sync via `dashdown skill`

branding:
  # Series colors, validated for CVD + contrast in light & dark mode.
  # Order matches series order in the queries: Yellow cab (amber), Uber (blue),
  # Lyft (pink), Green cab (green), then spares.
  palette: ["#d97706", "#4f6ef7", "#e8506e", "#2fa87c", "#8b6ff0", "#0e8ba6"]

# AI commentary (<Ask />). Optional: without ANTHROPIC_API_KEY the site still
# serves and builds — the Ask cards degrade to a muted note.
llm:
  provider: mistral
  api_key: ${MISTRAL_API_KEY}
  model: mistral-medium-latest

format:
  locale: en-US
  currency: USD

# Single-page dashboard — no top app header / nav chrome needed.
layout:
  header: false        # hide the top app header (brand / search / theme toggle)
  theme_toggle: true   # keep a floating light/dark toggle in its place
  sidebar:
    hidden: true       # never render the left nav
