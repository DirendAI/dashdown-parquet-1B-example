# The data source is just an in-memory DuckDB engine — there are NO tables to
# configure here. Every query reads the raw TLC Parquet files directly with
# read_parquet('data/…'), so each .sql file states exactly which data it touches.
# (Reading the files in the queries, rather than pre-loading them here, keeps the
#  billion-row history lazy — DuckDB only scans what each chart asks for.)
taxi:
  type: duckdb
